# ==============================================
# ATB CREDIT INTELLIGENCE - Configuration
# ==============================================

# --- Application ---
spring.application.name=stage_Atb
server.port=8081

# --- Base de DonnÈes PostgreSQL ---
spring.datasource.url=jdbc:postgresql://localhost:5433/stage_atb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# CHANGER create-drop EN update OU validate
# update : met ‡ jour le schÈma sans supprimer les donnÈes
# validate : vÈrifie que le schÈma correspond sans le modifier
# none : ne fait rien
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# --- DÈsactiver l'initialisation SQL ---
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# --- Jackson ---
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.time-zone=Africa/Tunis

# --- JWT Configuration ---
jwt.secret=ATBSecretKeyForCreditIntelligence2026WithEnoughLengthForHS512Algorithm
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# --- IA Python API ---
ia.api.url=http://localhost:8000
ia.api.timeout=10000

# --- Logging ---
logging.level.com.atb=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# --- OpenAPI / Swagger ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# --- CORS ---
cors.allowed-origins=http://localhost:4200
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# --- Upload ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- Flyway ---
spring.flyway.enabled=false

# --- Spring Security ---
spring.security.user.name=admin
spring.security.user.password=admin123