<!-- features/auth/login/login.component.html -->
<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>
        <div class="logo-container">
          <img src="assets/images/atb-logo.svg" alt="ATB" class="logo" />
          <h1>ATB Credit Intelligence</h1>
        </div>
      </mat-card-title>
      <mat-card-subtitle>
        Connectez-vous à votre espace
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <!-- Email -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input 
            matInput 
            formControlName="email" 
            placeholder="exemple@email.com"
            type="email"
            autocomplete="email"
          />
          <mat-icon matPrefix>email</mat-icon>
          <mat-error *ngIf="hasEmailError()">
            {{ getEmailErrorMessage() }}
          </mat-error>
        </mat-form-field>

        <!-- Mot de passe -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Mot de passe</mat-label>
          <input 
            matInput 
            formControlName="password" 
            [type]="hidePassword ? 'password' : 'text'"
            placeholder="••••••"
            autocomplete="current-password"
          />
          <mat-icon matPrefix>lock</mat-icon>
          <button 
            mat-icon-button 
            matSuffix 
            type="button"
            (click)="hidePassword = !hidePassword"
            [attr.aria-label]="'Masquer le mot de passe'"
            [attr.aria-pressed]="hidePassword"
          >
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="hasPasswordError()">
            {{ getPasswordErrorMessage() }}
          </mat-error>
        </mat-form-field>

        <!-- Message d'erreur -->
        <div *ngIf="errorMessage" class="error-message">
          <mat-icon>error_outline</mat-icon>
          <span>{{ errorMessage }}</span>
        </div>

        <!-- Vérification du compte en cours -->
        <div *ngIf="isCheckingAccount" class="checking-status">
          <mat-spinner diameter="20"></mat-spinner>
          <span>Vérification du compte...</span>
        </div>

        <!-- Bouton de connexion -->
        <button 
          mat-raised-button 
          color="primary" 
          type="submit" 
          class="login-button"
          [disabled]="loginForm.invalid || isLoading || password?.disabled"
        >
          <mat-spinner diameter="20" *ngIf="isLoading"></mat-spinner>
          <span *ngIf="!isLoading">Se connecter</span>
          <span *ngIf="isLoading">Connexion en cours...</span>
        </button>

        <!-- Lien d'inscription -->
        <div class="register-link">
          <span>Pas encore de compte ?</span>
          <a routerLink="/register">S'inscrire</a>
        </div>

        <!-- Lien mot de passe oublié -->
        <div class="forgot-password">
          <a routerLink="/forgot-password">Mot de passe oublié ?</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
