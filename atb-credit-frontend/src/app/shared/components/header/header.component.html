<header class="header" [class.collapsed]="isSidebarCollapsed">
  <div class="header-left">
    <button 
      mat-icon-button 
      class="menu-toggle"
      (click)="onToggleSidebar()"
      [matTooltip]="'Basculer la sidebar'">
      <mat-icon>menu</mat-icon>
    </button>
    
    <div class="logo">
      <mat-icon>account_balance</mat-icon>
      <span>ATB Credit</span>
    </div>
  </div>

  <div class="header-right">
    <!-- Notifications -->
    <button 
      mat-icon-button 
      class="notification-btn"
      [matTooltip]="'Notifications'">
      <mat-icon>notifications</mat-icon>
      <span class="badge">3</span>
    </button>

    <!-- User Menu -->
    <button 
      mat-icon-button 
      [matMenuTriggerFor]="userMenu"
      class="user-btn"
      [matTooltip]="'Profil utilisateur'">
      <div class="user-avatar">
        {{ getInitials() }}
      </div>
    </button>
    
    <mat-menu #userMenu="matMenu" class="user-menu">
      <!-- En-tête utilisateur avec animation -->
      <div class="user-header">
        <div class="user-avatar-wrapper">
          <div class="user-avatar-large">
            {{ getInitials() }}
          </div>
          <div class="status-indicator online"></div>
        </div>
        <div class="user-info">
          <div class="user-name">{{ getFullName() }}</div>
          <div class="user-email">{{ user?.email || '' }}</div>
          <span class="user-role">{{ user?.role || '' }}</span>
        </div>
      </div>
      
      <mat-divider></mat-divider>
      
      <!-- Menu items avec animations -->
      <button mat-menu-item routerLink="/profile" class="menu-item">
        <mat-icon>person_outline</mat-icon>
        <span>Mon profil</span>
      </button>
      
      <button mat-menu-item routerLink="/settings" class="menu-item">
        <mat-icon>settings_outline</mat-icon>
        <span>Paramètres</span>
      </button>
      
      <button mat-menu-item class="menu-item">
        <mat-icon>help_outline</mat-icon>
        <span>Aide & support</span>
      </button>
      
      <button mat-menu-item class="menu-item">
        <mat-icon>feedback_outline</mat-icon>
        <span>Donner un avis</span>
      </button>
      
      <mat-divider></mat-divider>
      
      <button mat-menu-item (click)="logout()" class="logout-btn">
        <mat-icon>logout</mat-icon>
        <span>Déconnexion</span>
      </button>
    </mat-menu>
  </div>
</header>
